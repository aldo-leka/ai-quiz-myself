name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: app-deploy
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: aldo-leka
          password: ${{ secrets.GHCR_PUSH_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aldo-leka/ai-quiz-myself
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Write build env file
        run: |
          cat > "${RUNNER_TEMP}/build.env" <<'EOF'
          ${{ secrets.BUILD_ENV }}
          EOF

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secret-files: |
            BUILD_ENV=${{ runner.temp }}/build.env

  deploy:
    needs: build-and-push
    runs-on:
      - self-hosted
      - deploy
      - quizplus-vps

    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_PUSH_TOKEN }}" | docker login ghcr.io -u aldo-leka --password-stdin

      - name: Deploy on VPS
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          /root/ai-quiz-myself/scripts/deploy.sh "$SHORT_SHA"

      - name: Log out of GHCR
        if: always()
        run: docker logout ghcr.io
